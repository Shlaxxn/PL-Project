<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck URL Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
    nav { margin-bottom: 1.2rem; border-bottom: 1px solid #cbd5e1; padding-bottom: 0.5rem; }
    nav a { color: #1e40af; margin-right: 1rem; font-weight: 700; text-decoration: none; padding-bottom: 0.1rem; }
    nav a.active { border-bottom: 2px solid #1e3a8a; }
    h1 { color: #1e3a8a; }
    form { display: grid; gap: 0.6rem; margin-bottom: 1.2rem; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; background: #f9fafb; }
    label { display: flex; flex-direction: column; font-weight: 600; gap: 0.25rem; }
    input[type="text"], input[type="url"] { padding: 0.55rem; font-size: 1rem; border: 1px solid #ccd0d5; border-radius: 4px; }
    button { width: 150px; padding: 0.65rem 0.8rem; border-radius: 5px; border: none; background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .deck-list { margin-top: 0.8rem; }
    .deck-item { border: 1px solid #e5e7eb; padding: 0.75rem; border-radius: 7px; margin-bottom: 0.65rem; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 0.7rem; }
    .deck-item p { margin: 0; }
    .deck-actions a, .deck-actions button { font-size: 0.86rem; margin-left: 0.4rem; text-decoration: none; border: 1px solid #94a3b8; border-radius: 4px; color: #1e3a8a; background: #f1f5f9; padding: 0.28rem 0.6rem; }
  </style>
</head>
<body>
  <nav>
    <a class="active" href="#">Decks</a>
    <a href="/game-stats">Game Stats</a>
    <a href="/deck-stats">Deck Stats</a>
  </nav>

  <h1>Deck URL Tracker</h1>
  <p>Save and open deck URLs for later visualizations.</p>

  <form id="deckForm">
    <label>
      Deck Name
      <input id="deckName" type="text" placeholder="e.g. My Main Deck" required />
    </label>
    <label>
      Deck URL
      <input id="deckUrl" type="url" placeholder="https://example.com/deck" required />
    </label>
    <button type="submit">Save Deck</button>
  </form>

  <div class="deck-list">
    <h2>Saved Decks</h2>
    <div id="savedDecks"></div>
  </div>

  <script>
    const STORAGE_KEY = 'savedDecks';

    function loadDecks() {
      try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
    }

    function saveDecks(decks) { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); }

    function render() {
      const container = document.getElementById('savedDecks');
      const decks = loadDecks();
      container.innerHTML = '';
      if (!decks.length) { container.innerHTML = '<p>No saved decks yet.</p>'; return; }
      decks.forEach((deck, idx) => {
        const node = document.createElement('div'); node.className = 'deck-item';
        const info = document.createElement('p');
        info.innerHTML = `<strong>${deck.name}</strong><br><a href="${deck.url}" target="_blank" rel="noopener noreferrer">${deck.url}</a>`;
        const actions = document.createElement('div'); actions.className = 'deck-actions';
        const openLink = document.createElement('a'); openLink.href = deck.url; openLink.target = '_blank'; openLink.rel = 'noopener noreferrer'; openLink.textContent = 'Open';
        const remove = document.createElement('button'); remove.type = 'button'; remove.textContent = 'Remove';
        remove.addEventListener('click', () => { const updated = loadDecks().filter((_, i) => i !== idx); saveDecks(updated); render(); });
        actions.append(openLink, remove); node.append(info, actions); container.appendChild(node);
      });
    }

    document.getElementById('deckForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('deckName').value.trim();
      const url = document.getElementById('deckUrl').value.trim();
      if (!name || !url) { alert('Both deck name and URL are required.'); return; }
      const decks = loadDecks(); decks.push({ name, url }); saveDecks(decks);
      document.getElementById('deckForm').reset(); render();
    });

    render();
  </script>
</body>
</html>
