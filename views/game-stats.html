<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Stats Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
    nav { margin-bottom: 1.2rem; border-bottom: 1px solid #cbd5e1; padding-bottom: 0.5rem; }
    nav a { color: #1e40af; margin-right: 1rem; font-weight: 700; text-decoration: none; padding-bottom: 0.1rem; }
    nav a.active { border-bottom: 2px solid #1e3a8a; }
    h1 { color: #1e3a8a; }
    form { display: grid; gap: 0.6rem; margin-bottom: 1.2rem; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; background: #f9fafb; }
    label { display: flex; flex-direction: column; font-weight: 600; gap: 0.25rem; }
    input, select, textarea { padding: 0.55rem; font-size: 1rem; border: 1px solid #ccd0d5; border-radius: 4px; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.8rem; }
    .full { grid-column: span 2; }
    button { width: 150px; padding: 0.65rem 0.8rem; border-radius: 5px; border: none; background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .item-list { margin-top: 0.8rem; }
    .item-card { border: 1px solid #e5e7eb; padding: 0.75rem; border-radius: 7px; margin-bottom: 0.65rem; display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 0.7rem; }
    .item-card p { margin: 0.05rem 0; }
    .actions button { font-size: 0.86rem; margin-left: 0.4rem; text-decoration: none; border: 1px solid #94a3b8; border-radius: 4px; color: #1e3a8a; background: #f1f5f9; padding: 0.28rem 0.6rem; }
  </style>
</head>
<body>
  <nav>
    <a href="home.html">Decks</a>
    <a class="active" href="game-stats.html">Game Stats</a>
    <a href="deck-stats.html">Deck Stats</a>
  </nav>

  <h1>Game Stats Tracker</h1>
  <p>Log games with deck name, seats, result, turn, and notes.</p>

  <form id="statsForm">
    <div id="deckWarning" style="color: #b91c1c; font-weight: 600; margin-bottom: 0.5rem; display: none;">Please add at least one deck on the Decks page before saving game stats.</div>
    <div class="row">
      <label>
        Deck Name
        <select id="statsDeckName" required>
          <option value="">Select a deck name</option>
        </select>
      </label>
      <label>
        Seats
        <select id="statsSeats" required>
          <option value="">Select seats</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </label>
    </div>
    <div class="row">
      <label>
        Game Result
        <select id="statsResult" required>
          <option value="">Select result</option>
          <option value="Win">Win</option>
          <option value="Loss">Loss</option>
          <option value="Draw">Draw</option>
        </select>
      </label>
      <label>
        Turn
        <input id="statsTurn" type="number" min="1" placeholder="Turn count" required />
      </label>
    </div>
    <label class="full">
      Notes
      <textarea id="statsNotes" placeholder="Optional notes"></textarea>
    </label>
    <button type="submit">Save Game</button>
  </form>

  <div class="item-list">
    <h2>Saved Game Stats</h2>
    <div id="savedGameStats"></div>
  </div>

  <script>
    const GAME_STORAGE_KEY = 'savedGameStats';
    const DECK_STORAGE_KEY = 'savedDecks';

    function loadData() {
      try { const raw = localStorage.getItem(GAME_STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
    }

    function loadDecks() {
      try { const raw = localStorage.getItem(DECK_STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
    }

    function populateDeckDropdown() {
      const deckSelect = document.getElementById('statsDeckName');
      const warning = document.getElementById('deckWarning');
      const decks = loadDecks();
      deckSelect.innerHTML = '<option value="">Select a deck name</option>';

      if (!decks.length) {
        warning.style.display = 'block';
        document.getElementById('statsForm').querySelector('button[type="submit"]').disabled = true;
        return;
      }

      warning.style.display = 'none';
      document.getElementById('statsForm').querySelector('button[type="submit"]').disabled = false;

      decks.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.name;
        opt.textContent = d.name;
        deckSelect.appendChild(opt);
      });
    }

    function saveData(items) { localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(items)); }

    function render() {
      const container = document.getElementById('savedGameStats');
      const stats = loadData();
      container.innerHTML = '';
      if (!stats.length) { container.innerHTML = '<p>No game stats saved yet.</p>'; return; }
      stats.forEach((s, idx) => {
        const card = document.createElement('div'); card.className = 'item-card';
        const body = document.createElement('div');
        body.innerHTML = `<p><strong>${s.deckName}</strong> | Seats: ${s.seats} | Result: ${s.result} | Turn: ${s.turn}</p><p>${s.notes || '<em>No notes</em>'}</p>`;
        const actions = document.createElement('div'); actions.className = 'actions';
        const remove = document.createElement('button'); remove.type = 'button'; remove.textContent = 'Remove';
        remove.addEventListener('click', () => { const updated = loadData().filter((_, i) => i !== idx); saveData(updated); render(); });
        actions.appendChild(remove); card.append(body, actions); container.appendChild(card);
      });
    }

    document.getElementById('statsForm').addEventListener('submit', e => {
      e.preventDefault();
      const decks = loadDecks();
      if (!decks.length) {
        alert('Please add at least one deck before saving game stats.');
        return;
      }
      const deckName = document.getElementById('statsDeckName').value.trim();
      const seats = document.getElementById('statsSeats').value;
      const result = document.getElementById('statsResult').value;
      const turn = document.getElementById('statsTurn').value.trim();
      const notes = document.getElementById('statsNotes').value.trim();
      if (!deckName || !seats || !result || !turn) {
        alert('Deck name, seats, result, and turn are required.');
        return;
      }
      const stats = loadData();
      stats.push({ deckName, seats, result, turn, notes });
      saveData(stats);
      document.getElementById('statsForm').reset();
      populateDeckDropdown();
      render();
    });

    populateDeckDropdown();
    render();
  </script>
</body>
</html>
